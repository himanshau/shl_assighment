# Deploy from frontend/:  fly deploy
# Set build args after backend is live (see DEPLOY_FLY.md).
app = "shl-assignment-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

  # Update after backend is live (or pass via: fly deploy --build-arg ...)
  [build.args]
    NEXT_PUBLIC_API_URL = "https://shl-assignment-api.fly.dev"
    NEXT_PUBLIC_WS_URL = "wss://shl-assignment-api.fly.dev/ws"

[env]
  PORT = "3000"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
